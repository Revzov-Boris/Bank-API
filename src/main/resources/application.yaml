spring:
  application:
    name: bankcards
  config:
    activate:
      on-profile: dev
  profiles:
    active: dev

  liquibase:
    enabled: true
    change-log: classpath:db/migration/db-changelog-master.yaml
    drop-first: false  # Не удалять данные при старте

  # Настройки БД
  datasource:
    url: jdbc:postgresql://localhost:5430/bankcards
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

    # Настройки пула соединений Hikari
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    # Стратегии именования
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy


    # Показывать SQL запросы
    show-sql: true

    # Форматировать SQL
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true


springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha

card:
  encryption:
    # Секретный ключ
    secret: 3lwefsa0
    # Алгоритм шифрования
    algorithm: AES
    # Режим шифрования
    transformation: AES/ECB/PKCS5Padding


jwt:
  secret: 4h4E6352pio556A586qq272357538782Fgl3F4428472B4B6250645367566B5988  # 64 символа
  expiration: 86400000  # 24 часа
  header: Authorization
  prefix: Bearer

# ОСНОВНЫЕ НАСТРОЙКИ ПРИЛОЖЕНИЯ
server:
  port: 8080


logging:
  level:
    liquibase: INFO
    org.springframework.boot: INFO